<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 170" fill="none">
  <!-- flourishes flanking the wordmark -->
  <g stroke="#1C1813" stroke-width="1.4" stroke-linecap="round" fill="none">
    <path d="M40 36 C58 28 74 32 92 38"/>
    <circle cx="40" cy="36" r="1.3" fill="#1C1813" stroke="none"/>
    <path d="M300 36 C282 28 266 32 248 38"/>
    <circle cx="300" cy="36" r="1.3" fill="#1C1813" stroke="none"/>
  </g>
  <!-- wordmark -->
  <text x="170" y="48" text-anchor="middle" font-family="'Playfair Display', Georgia, 'Times New Roman', serif" font-size="34" font-weight="800" letter-spacing="6" fill="#1C1813">OPTICLEAN</text>
  <text x="170" y="70" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="15" font-style="italic" letter-spacing="1" fill="#CC9628">by Dr. Zac</text>
  <!-- medallion -->
  <g transform="translate(170 116)">
    <circle r="27" fill="#FBF8F0" stroke="#E6DCC8" stroke-width="1"/>
    <g transform="translate(0 -1)">
      <!-- bowler hat -->
      <ellipse cx="0" cy="-10" rx="13" ry="3.2" fill="#1C1813"/>
      <path d="M-9 -10c0-3.6 1.4-6.2 9-6.2s9 2.6 9 6.2z" fill="#1C1813"/>
      <!-- glasses -->
      <circle cx="-6" cy="1" r="4.4" fill="none" stroke="#1C1813" stroke-width="1.5"/>
      <circle cx="6" cy="1" r="4.4" fill="none" stroke="#1C1813" stroke-width="1.5"/>
      <path d="M-1.6 1h3.2" stroke="#1C1813" stroke-width="1.5"/>
      <path d="M-10.4 1c-1.6-.5-3.2 0-3.8 1.1M10.4 1c1.6-.5 3.2 0 3.8 1.1" stroke="#1C1813" stroke-width="1.3"/>
      <!-- mustache -->
      <path d="M-5.4 6.4c1.6 1.9 3.4 2.8 5.4 2.8s3.8-.9 5.4-2.8" stroke="#1C1813" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- beard -->
      <path d="M-4.2 9.6c1.3 1.6 2.8 2.4 4.2 2.4s2.9-.8 4.2-2.4l-.7 4.8c-1.1 1-2.2 1.4-3.5 1.4s-2.4-.4-3.5-1.4z" fill="#1C1813"/>
      <!-- bowtie -->
      <path d="M-4.4 18.2l4.4 2.2 4.4-2.2-4.4-1.3z" fill="#1C1813"/>
    </g>
  </g>
</svg>
